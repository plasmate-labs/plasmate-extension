<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0a0a0a; color: #e5e5e5; font-size: 13px; }
    .header { padding: 12px 16px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 8px; }
    .header svg { width: 20px; height: 20px; }
    .header h1 { font-size: 14px; font-weight: 600; flex: 1; }
    .bridge-status { font-size: 10px; color: #666; display: flex; align-items: center; gap: 4px; }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
    .status-dot.online { background: #22c55e; }
    .status-dot.offline { background: #666; }
    .domain { padding: 8px 16px; background: #111; border-bottom: 1px solid #222; font-size: 12px; color: #888; }
    .domain span { color: #e5e5e5; font-weight: 500; }
    .cookies { max-height: 280px; overflow-y: auto; }
    .cookie { padding: 8px 16px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .cookie:hover { background: #151515; }
    .cookie input[type="checkbox"] { accent-color: #7c6ef0; }
    .cookie-name { font-weight: 500; font-size: 12px; min-width: 100px; }
    .cookie-value { font-size: 11px; color: #666; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-family: "SF Mono", Monaco, monospace; }
    .cookie.recommended { background: #0f0d1a; }
    .cookie.recommended .cookie-name { color: #a78bfa; }
    .tag { font-size: 9px; background: #2d2250; color: #a78bfa; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
    .actions { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid #222; }
    .actions-row { display: flex; gap: 8px; }
    .btn { flex: 1; padding: 8px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
    .btn-push { background: #22c55e; color: #0a0a0a; }
    .btn-push:hover { background: #16a34a; }
    .btn-primary { background: #7c6ef0; color: white; }
    .btn-primary:hover { background: #6b5ce0; }
    .btn-secondary { background: #222; color: #ccc; }
    .btn-secondary:hover { background: #2a2a2a; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .empty { padding: 32px 16px; text-align: center; color: #666; }
    .copied { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #a78bfa; padding: 6px 16px; border-radius: 6px; font-size: 12px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .copied.show { opacity: 1; }
    .select-controls { padding: 4px 16px; display: flex; gap: 12px; font-size: 11px; }
    .select-controls a { color: #7c6ef0; cursor: pointer; text-decoration: none; }
    .select-controls a:hover { text-decoration: underline; }
    .handoff-section { padding: 12px 16px; border-bottom: 1px solid #222; }
    .btn-handoff { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border: none; border-radius: 6px; background: #7c6ef0; color: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-handoff:hover { background: #6b5ce0; }
    .btn-handoff svg { width: 16px; height: 16px; }
    .divider { height: 1px; background: #222; margin: 0; }
  </style>
</head>
<body>
  <div class="header">
    <svg viewBox="0 0 24 24" fill="none" stroke="#7c6ef0" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M8 12l3 3 5-5"/>
    </svg>
    <h1>Plasmate</h1>
    <div class="bridge-status" id="bridge-status">
      <span class="status-dot offline"></span>Checking...
    </div>
  </div>
  
  <!-- Handoff Section -->
  <div class="handoff-section">
    <button class="btn-handoff" id="handoff-page">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M22 2L11 13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      Hand off this page
    </button>
  </div>
  
  <div class="domain">Cookies for <span id="domain">loading...</span></div>
  <div class="select-controls">
    <a id="select-all">Select all</a>
    <a id="select-none">Select none</a>
  </div>
  <div class="cookies" id="cookies"></div>
  <div class="actions">
    <button class="btn btn-push" id="push-plasmate">Push to Plasmate</button>
    <div class="actions-row">
      <button class="btn btn-secondary" id="copy-cli">Copy CLI</button>
      <button class="btn btn-secondary" id="copy-json">Copy JSON</button>
    </div>
  </div>
  <div class="copied" id="copied">Copied!</div>
  <script src="popup.js"></script>
</body>
</html>
