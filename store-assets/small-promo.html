<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px; height: 280px; background: #111110;
    font-family: 'Space Grotesk', sans-serif; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    position: relative;
  }
  /* Subtle background glow */
  .glow {
    position: absolute; top: -40px; left: 50%; transform: translateX(-50%);
    width: 300px; height: 200px;
    background: radial-gradient(ellipse, rgba(232,133,58,0.10) 0%, transparent 70%);
    pointer-events: none;
  }
  /* Bottom accent line */
  .accent-line {
    position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, transparent 0%, #E8853A 50%, transparent 100%);
  }
  .mark {
    width: 64px; height: 64px; margin-bottom: 16px; position: relative; z-index: 1;
  }
  .tagline {
    font-size: 18px; font-weight: 600; color: #F0EDE8;
    letter-spacing: -0.02em; position: relative; z-index: 1;
  }
  .tagline span { color: #E8853A; }
  .sub {
    font-size: 12px; color: #666; margin-top: 6px; position: relative; z-index: 1;
    letter-spacing: 0.05em; text-transform: uppercase;
  }
</style>
</head>
